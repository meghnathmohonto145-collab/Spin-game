<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Casino Spin & Earn</title>
    
    <!-- Telegram Ad SDK Loader -->

    <script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: radial-gradient(circle, #1f003c, #070014);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
            padding: 20px 0;
        }
        
        /* ড্যাশবোর্ড */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(10px);
            margin-bottom: 20px;
        }
        .logo { font-size: 18px; font-weight: bold; color: #ffd700; text-shadow: 0 0 10px #ffd700; }
        .coin-box { background: #000; padding: 6px 15px; border-radius: 20px; border: 2px solid #ffd700; font-weight: bold; color: #ffcc00; }

        .game-container { position: relative; display: flex; flex-direction: column; align-items: center; }
        
        /* হুইল বা চাকা */
        .wheel-outer {
            width: 330px;
            height: 330px;
            border: 12px solid #ffd700;
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4), inset 0 0 20px #000;
            overflow: hidden;
        }
        .pointer {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 16px solid transparent;
            border-right: 16px solid transparent;
            border-top: 32px solid #ff0055;
            z-index: 10;
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.6));
        }
        .wheel {
            width: 100%; height: 100%;
            border-radius: 50%;
            position: relative;
            transition: transform 4.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* চাকার ভেতরের স্লাইস ও টেক্সট ডিজাইন */
        .slice {
            position: absolute;
            width: 50%; height: 50%;
            left: 50%; top: 50%;
            transform-origin: 0% 0%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .slice span {
            position: absolute;
            left: 40px; top: 30px;
            transform: rotate(60deg);
            font-weight: bold;
            font-size: 13px;
            text-shadow: 1px 1px 3px #000;
            white-space: nowrap;
        }
        /* স্লাইসের ট্রায়াঙ্গেল শেপ ও কালার */
        .s1 { transform: rotate(0deg) skewY(30deg); background: #d50000; }       /* লাল */
        .s2 { transform: rotate(60deg) skewY(30deg); background: #1a237e; }     /* নীল */
        .s3 { transform: rotate(120deg) skewY(30deg); background: #ffaa00; }    /* হলুদ */
        .s4 { transform: rotate(180deg) skewY(30deg); background: #ffffff; color: #000; } /* সাদা */
        .s4 span { text-shadow: none; }
        .s5 { transform: rotate(240deg) skewY(30deg); background: #00c853; }    /* সবুজ */
        .s6 { transform: rotate(300deg) skewY(30deg); background: #aa00ff; }    /* বেগুনি */

        .center-pin {
            position: absolute; width: 30px; height: 30px; background: #ffd700;
            border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #000; z-index: 5; border: 2px solid #fff;
        }

        /* বেটিং কন্ট্রোল */
        .bet-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.08);
            padding: 8px 15px;
            border-radius: 25px;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .bet-btn {
            background: #ffd700; border: none; width: 30px; height: 30px;
            border-radius: 50%; font-weight: bold; font-size: 18px; cursor: pointer; color: #000;
        }
        #betDisplay { font-size: 18px; font-weight: bold; color: #ffd700; min-width: 40px; text-align: center; }

        /* বাটন গ্রুপ */
        .btn-group { display: flex; gap: 15px; margin-top: 20px; }
        .action-btn {
            padding: 12px 35px; font-size: 16px; font-weight: bold; border: none;
            border-radius: 25px; cursor: pointer; text-transform: uppercase; transition: 0.2s;
        }
        .spin-btn { background: linear-gradient(45deg, #ffd700, #ff9900); color: #000; box-shadow: 0 5px 15px rgba(255,153,0,0.4); }
        .withdraw-btn { background: linear-gradient(45deg, #00c853, #b2ff59); color: #000; box-shadow: 0 5px 15px rgba(0,200,83,0.4); }
        .action-btn:disabled { background: #444 !important; color: #888 !important; box-shadow: none !important; cursor: not-allowed; }

        /* রেজাল্ট বক্স */
        .result { margin-top: 20px; font-size: 20px; font-weight: bold; min-height: 30px; text-align: center; }
        .win { color: #00ff66; text-shadow: 0 0 15px rgba(0,255,102,0.5); }
        .lose { color: #ff3366; text-shadow: 0 0 15px rgba(255,51,102,0.5); }

        /* উইথড্র পপ-আপ (Modal) */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #15002a; padding: 25px; border-radius: 20px; width: 85%; max-width: 340px;
            border: 2px solid #00c853; text-align: center; box-shadow: 0 0 25px rgba(0,200,83,0.3);
        }
        .modal h3 { color: #00c853; margin-bottom: 15px; }
        .modal select, .modal input {
            width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px;
            border: 1px solid #444; background: #000; color: #fff; font-size: 15px; outline: none;
        }
        .modal select:focus, .modal input:focus { border-color: #00c853; }
        .modal-btns { display: flex; gap: 10px; margin-top: 15px; }
        .modal-box-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .confirm-w { background: #00c853; color: #000; }
        .cancel-w { background: #d50000; color: #fff; }
    </style>
</head>
<body>

    <!-- টপ ড্যাশবোর্ড -->
    <div class="header-bar">
        <div class="logo">🎰 PRO SPINNER</div>
        <div class="coin-box">🪙 <span id="coinDisplay">500</span></div>
    </div>

    <div class="game-container">
        <div class="pointer"></div>
        <div class="wheel-outer">
            <div class="wheel" id="wheel">
                <!-- স্লাইসের টেক্সট ও ডিজাইন (রং অনুযায়ী গুছানো) -->
                <div class="slice s1"><span> (x0)</span></div>
                <div class="slice s2"><span> (x2)</span></div>
                <div class="slice s3"><span> (x5)</span></div>
                <div class="slice s4"><span>(x0)</span></div>
                <div class="slice s5"><span>(x10)</span></div>
                <div class="slice s6"><span>(x1.5)</span></div>
            </div>
            <div class="center-pin"></div>
        </div>

        <!-- বেট সিস্টেম -->
        <div class="bet-container">
            <button class="bet-btn" onclick="adjustBet(-10)">-</button>
            <div>BET: 🪙<span id="betDisplay">20</span></div>
            <button class="bet-btn" onclick="adjustBet(10)">+</button>
        </div>

        <!-- বাটনসমূহ -->
        <div class="btn-group">
            <button class="action-btn spin-btn" id="spinBtn" onclick="spinWheel()">SPIN</button>
            <button class="action-btn withdraw-btn" id="withdrawBtn" onclick="openModal()">টাকা তুলুন</button>
        </div>
        
        <div class="result" id="resultBox">আপনার বেট ধরুন এবং স্পিন করুন!</div>
    </div>

    <!-- টাকা তোলার পপ-আপ ফর্ম -->
    <div class="modal" id="withdrawModal">
        <div class="modal-content">
            <h3>💰 টাকা উত্তোলন (Withdraw)</h3>
            <p style="font-size: 13px; color: #aaa; margin-bottom: 10px;">১ কয়েন = ১ টাকা</p>
            
            <select id="method">
                <option value="bKash">বিকাশ (bKash)</option>
                <option value="Nagad">নগদ (Nagad)</option>
                <option value="Rocket">রকেট (Rocket)</option>
            </select>
            
            <input type="number" id="accountNumber" placeholder="অ্যাকাউন্ট নাম্বার দিন" required>
            <input type="number" id="amount" placeholder="টাকার পরিমাণ লিখুন" required>
            
            <div class="modal-btns">
                <button class="modal-box-btn confirm-w" onclick="processWithdraw()">কনফার্ম</button>
                <button class="modal-box-btn cancel-w" onclick="closeModal()">বাতিল</button>
            </div>
        </div>
    </div>

    <script>
        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spinBtn');
        const withdrawBtn = document.getElementById('withdrawBtn');
        const coinDisplay = document.getElementById('coinDisplay');
        const betDisplay = document.getElementById('betDisplay');
        const resultBox = document.getElementById('resultBox');
        const modal = document.getElementById('withdrawModal');

        // স্লাইসের গুণিতক (Multipliers) এবং রং নাম্বারিং
        // ক্যাসিনো রুলস অনুযায়ী কাউন্টার ক্লক-ওয়াইজ হিসাব করা হয়েছে
        const slicesInfo = [
            { text: "🔴 লাল ঘর! কোনো কয়েন পাননি।", multiplier: 0, type: "lose" },
            { text: "🟣 বেগুনি ঘর! ১.৫ গুণ বোনাস!", multiplier: 1.5, type: "win" },
            { text: "🟢 সবুজ ঘর! ১০ গুণ জ্যান্ত জ্যাকপট!!", multiplier: 10, type: "win" },
            { text: "⚪ সাদা ঘর! কপাল খারাপ, ০ গুণ।", multiplier: 0, type: "lose" },
            { text: "🟡 হলুদ ঘর! ৫ গুণ কয়েন লাভ!", multiplier: 5, type: "win" },
            { text: "🔵 নীল ঘর! ডাবল (২ গুণ) রিওয়ার্ড!", multiplier: 2, type: "win" }
        ];
        
        let currentRotation = 0;
        let currentBet = 20;
        
        // ডেটা আজীবনের জন্য সেভ রাখার LocalStorage মেকানিজম (ডিফল্ট ৫০০ কয়েন দেওয়া হলো)
        let coins = parseInt(localStorage.getItem('casino_user_coins')) || 500;
        coinDisplay.innerText = coins;

        // বেট কমানো বাড়ানোর ফাংশন
        function adjustBet(val) {
            currentBet += val;
            if (currentBet < 10) currentBet = 10; // সর্বনিম্ন বেট ১০
            if (currentBet > 100) currentBet = 100; // সর্বোচ্চ বেট ১০০
            betDisplay.innerText = currentBet;
        }

        // স্পিন করার মেইন কোড
        function spinWheel() {
            if (coins < currentBet) {
                resultBox.className = "result lose";
                resultBox.innerText = "❌ পর্যাপ্ত কয়েন নেই! বেট কমান অথবা কয়েন যোগ করুন।";
                return;
            }

            // বাটন লক ও বেট কেটে নেওয়া
            spinBtn.disabled = true;
            withdrawBtn.disabled = true;
            coins -= currentBet;
            updateCoins();

            resultBox.className = "result";
            resultBox.style.color = "#ffd700";
            resultBox.innerText = "🎰 চাকা ঘুরছে... ভাগ্য নির্ধারণ হচ্ছে...";

            // চাকা ঘোরানোর ডিগ্রি জেনারেট (৫ চক্কর + এক্সট্রা)
            const randomDegree = Math.floor(Math.random() * 3600);
            currentRotation += 180000 + randomDegree; 
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            // ৪.৫ সেকেন্ড পর কাঁটার নিখুঁত রেজাল্ট
            setTimeout(() => {
                spinBtn.disabled = false;
                withdrawBtn.disabled = false;

                // কাঁটা কোন স্লাইসে পড়লো তার ক্যালকুলেশন (৩৬০ / ৬ স্লাইস = ৬০ ডিগ্রি প্রতি স্লাইস)
                const actualDegree = (currentRotation % 360);
                const sliceIndex = Math.floor(actualDegree / 60); 
                
                const result = slicesInfo[sliceIndex];
                const winAmount = Math.floor(currentBet * result.multiplier);
                
                coins += winAmount;
                updateCoins();

                resultBox.className = `result ${result.type}`;
                if(winAmount > 0) {
                    resultBox.innerText = `${result.text} (+🪙${winAmount})`;
                } else {
                    resultBox.innerText = result.text;
                }
                
            }, 4500);
        }

        // কয়েন আপডেট ও সেভ করার ফাংশন
        function updateCoins() {
            coinDisplay.innerText = coins;
            localStorage.setItem('casino_user_coins', coins);
        }

        // উইথড্র পপ-আপ কন্ট্রোল
        function openModal() { modal.style.display = "flex"; }
        function closeModal() { modal.style.display = "none"; }

        // টাকা তোলার আসল প্রসেস
        function processWithdraw() {
            const method = document.getElementById('method').value;
            const number = document.getElementById('accountNumber').value;
            const amount = parseInt(document.getElementById('amount').value);

            if (!number || !amount) {
                alert("দয়া করে সব তথ্য সঠিকভাবে পূরণ করুন!");
                return;
            }
            if (amount <= 0) {
                alert("বৈধ টাকার পরিমাণ লিখুন!");
                return;
            }
            if (amount > coins) {
                alert("দুঃখিত! আপনার একাউন্টে পর্যাপ্ত ব্যালেন্স বা কয়েন নেই।");
                return;
            }

            // একাউন্ট থেকে কয়েন (টাকা) ডিলিট/মাইনাস করে দেওয়া
            coins -= amount;
            updateCoins();
            
            closeModal();
            
            // সাকসেস মেসেজ ও ইনপুট ফিল্ড ক্লিয়ার করা
            resultBox.className = "result win";
            resultBox.innerText = `✅ সফলভাবে ${amount} টাকা ${method}-এ উত্তোলনের রিকোয়েস্ট পাঠানো হয়েছে।`;
            
            document.getElementById('accountNumber').value = "";
            document.getElementById('amount').value = "";
            
            alert(`🎉 উইথড্র সফল!\n${amount} টাকা আপনার ${number} (${method}) নাম্বারে প্রসেস করা হচ্ছে। ব্যালেন্স থেকে কয়েন কেটে নেওয়া হয়েছে।`);
        }
    </script>
</body>
</html>
